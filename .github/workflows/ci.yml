name: CI

on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*.*.*'
    paths:
      - 'src/**'
      - 'native/**'
      - 'tests/**'
      - 'package.json'
      - 'yarn.lock'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'vitest*.config.ts'
      - 'binding.gyp'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'native/**'
      - 'tests/**'
      - 'package.json'
      - 'yarn.lock'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'vitest*.config.ts'
      - 'binding.gyp'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - run: corepack enable
      - run: corepack prepare yarn@4.9.1 --activate
      - run: yarn install --immutable
      - run: yarn lint

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
      - run: corepack enable
      - run: corepack prepare yarn@4.9.1 --activate
      - run: yarn install --immutable
      - run: yarn build --verbose
      - run: yarn type-check
      - name: Run tests
        run: yarn test run
